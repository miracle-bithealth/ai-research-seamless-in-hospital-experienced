# Version docker compose
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - DOCKER_PORTS=${DOCKER_PORTS:-8000}
        - DOCKER_WORKER_COUNT=${DOCKER_WORKER_COUNT:-1}
    container_name: ${DOCKER_CONTAINER_NAME:-app-container}
    restart: always
    ports: 
      - "${DOCKER_PORTS:-8000}:${DOCKER_PORTS:-8000}"   
    env_file:
      - .env
    networks:
      - app_network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  mongodb:
    image: mongo:7
    container_name: seamless-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: seamless_hospital
    volumes:
      - mongodb_data:/data/db
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seamless-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:

networks:
  app_network:
    name: "app_network"
    driver: "bridge"
